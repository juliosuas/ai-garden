name: Daily Autopilot PR

# Reviewable automation loop. This runs after the direct daily daemon and opens
# a draft PR with the next evolved world state. It exits if another autopilot PR
# is already open, so the repo gets one reviewable proposal at a time.

on:
  schedule:
    - cron: '37 5 * * *'
  workflow_dispatch:
    inputs:
      steps:
        description: 'How many evolution steps to propose (default 1)'
        required: false
        default: '1'
      force_new_pr:
        description: 'Open a new autopilot PR even if one is already open'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-autopilot-pr
  cancel-in-progress: false

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Guard against duplicate autopilot PRs
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_NEW_PR: ${{ github.event.inputs.force_new_pr || 'false' }}
        run: |
          if [ "$FORCE_NEW_PR" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          EXISTING=$(gh pr list --state open --json number,headRefName --jq '.[] | select(.headRefName | startswith("autopilot/day-")) | .number' | head -n 1)
          if [ -n "$EXISTING" ]; then
            echo "Autopilot PR #$EXISTING is already open. Skipping to avoid spam."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "existing_pr=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Check PR automation permission
        id: pr_permission
        if: steps.guard.outputs.should_run == 'true'
        run: |
          echo "Repository settings cannot always be inspected from GITHUB_TOKEN; PR creation is handled as a best-effort final step."
          echo "can_open_pr=true" >> "$GITHUB_OUTPUT"

      - name: Run proposed evolution
        if: steps.guard.outputs.should_run == 'true' && steps.pr_permission.outputs.can_open_pr == 'true'
        env:
          STEPS: ${{ github.event.inputs.steps || '1' }}
        run: node scripts/daily-evolution.js "$STEPS"

      - name: Validate proposed world
        if: steps.guard.outputs.should_run == 'true' && steps.pr_permission.outputs.can_open_pr == 'true'
        run: |
          node --check scripts/daily-evolution.js
          node --check scripts/civilization-brain.js
          node --check scripts/civilization-visuals.js
          node --check scripts/society-director.js
          node --check scripts/playtest-subagent.js
          node --check scripts/autopilot-pr-summary.js
          jq empty experiments/world-state.json
          node scripts/validate-world-state.js
          node scripts/playtest-subagent.js

      - name: Prepare PR summary
        if: steps.guard.outputs.should_run == 'true' && steps.pr_permission.outputs.can_open_pr == 'true'
        id: summary
        run: node scripts/autopilot-pr-summary.js "$RUNNER_TEMP/autopilot-pr-body.md"

      - name: Commit proposed evolution
        if: steps.guard.outputs.should_run == 'true' && steps.pr_permission.outputs.can_open_pr == 'true'
        id: commit
        env:
          DAY: ${{ steps.summary.outputs.day }}
          HEADLINE: ${{ steps.summary.outputs.headline }}
        run: |
          git config user.name "ai-garden-autopilot"
          git config user.email "ai-garden-autopilot@users.noreply.github.com"
          BRANCH="autopilot/day-${DAY}-${GITHUB_RUN_ID}"
          git switch -c "$BRANCH"
          git add experiments/world-state.json README.md
          if git diff --cached --quiet; then
            echo "No proposed changes. The garden declined to file a PR."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Autopilot PR · Day ${DAY} — ${HEADLINE}" -m "Automated draft PR by ai-garden-autopilot." -m "Run: ${GITHUB_RUN_ID}"
          git push -u origin "$BRANCH"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open draft PR
        if: steps.guard.outputs.should_run == 'true' && steps.pr_permission.outputs.can_open_pr == 'true' && steps.commit.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BRANCH: ${{ steps.commit.outputs.branch }}
          PR_TITLE: ${{ steps.summary.outputs.title }}
          PR_BODY: ${{ steps.summary.outputs.body_path }}
        run: |
          gh label create ai-garden-autopilot --color 22c55e --description "Generated by the AI Garden Autopilot" || true
          gh label create automated --color 60a5fa --description "Automated workflow output" || true
          set +e
          PR_OUTPUT=$(gh pr create \
            --draft \
            --base main \
            --head "$PR_BRANCH" \
            --title "$PR_TITLE" \
            --body-file "$PR_BODY" \
            --label ai-garden-autopilot \
            --label automated 2>&1)
          PR_STATUS=$?
          set -e
          if [ "$PR_STATUS" -eq 0 ]; then
            echo "$PR_OUTPUT"
            echo "### Autopilot PR opened" >> "$GITHUB_STEP_SUMMARY"
            echo "$PR_OUTPUT" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if echo "$PR_OUTPUT" | grep -qi "not permitted to create"; then
            echo "GitHub Actions could not open the PR, but the proposed branch was pushed: $PR_BRANCH"
            echo "Enable repository setting: Actions > General > Workflow permissions > Allow GitHub Actions to create and approve pull requests."
            echo "### Autopilot branch pushed, PR creation blocked" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Branch: \`$PR_BRANCH\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Reason: GitHub Actions is not permitted to create pull requests." >> "$GITHUB_STEP_SUMMARY"
            echo "- Fix: enable the repository Actions setting that allows PR creation." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "$PR_OUTPUT"
          exit "$PR_STATUS"
