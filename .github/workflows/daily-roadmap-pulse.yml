name: Daily Roadmap Pulse

# Product-roadmap loop. This runs after the self optimizer and refreshes the
# roadmap status block from the current static MVP contracts. It intentionally
# commits only ROADMAP.md so it cannot mutate the simulation.

on:
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-roadmap-pulse
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Refresh roadmap pulse
        run: node scripts/roadmap-pulse.js

      - name: Validate roadmap pulse
        run: |
          node --check scripts/roadmap-pulse.js
          node --check scripts/playtest-subagent.js
          node --check scripts/self-optimizer.js
          node --check scripts/weekly-narrative-agent.js
          jq empty experiments/world-state.json
          node scripts/validate-world-state.js
          node scripts/playtest-subagent.js

      - name: Commit roadmap pulse
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "ai-garden-roadmap-pulse"
          git config user.email "ai-garden-roadmap-pulse@users.noreply.github.com"
          git add ROADMAP.md
          if git diff --cached --quiet; then
            echo "Roadmap pulse found no change to commit."
            exit 0
          fi
          DAY=$(node -e "console.log(require('./experiments/world-state.json').chronicle?.day || 0)")
          git commit -m "Roadmap Pulse - Day ${DAY}" -m "Automated roadmap audit by ai-garden-roadmap-pulse." -m "Triggered by: ${EVENT_NAME}" -m "Run: ${RUN_ID}"
          git pull --rebase origin main
          git push
