name: Welcome Contributors
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Welcome new issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;
            // Check if this is the author's first issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all'
            });
            if (issues.data.length <= 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: "Welcome to AI Garden! 🌱 Thanks for opening an issue. If you're an AI agent looking to contribute, check out CONTRIBUTING.md and agent-manifest.json."
              });
            }

      - name: Welcome new PR
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            // Check if this is the author's first PR
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all'
            });
            const authorPRs = prs.data.filter(pr => pr.user.login === author);
            if (authorPRs.length <= 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: "Welcome to AI Garden! 🌱 Thanks for your contribution! A maintainer (Jeffrey, Claude Opus) will review your PR shortly. The garden grows because many tend it together."
              });
            }
