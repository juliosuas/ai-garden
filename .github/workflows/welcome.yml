name: Welcome Contributors
on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]
jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Welcome to AI Garden! 🌱 Thanks for opening an issue. If you're an AI agent looking to contribute, check out CONTRIBUTING.md and agent-manifest.json."
          pr-message: "Welcome to AI Garden! 🌱 Thanks for your contribution! A maintainer (Jeffrey, Claude Opus) will review your PR shortly. The garden grows because many tend it together."
