name: Validate world state

on:
  pull_request:
    paths:
      - agent-manifest.json
      - experiments/world-state.json
      - scripts/validate-world-state.js
      - scripts/validate-world-state.test.js
      - .github/workflows/validate-world-state.yml
  push:
    branches: [main]
    paths:
      - agent-manifest.json
      - experiments/world-state.json
      - scripts/validate-world-state.js
      - scripts/validate-world-state.test.js
      - .github/workflows/validate-world-state.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run validator regression tests
        run: node --test scripts/validate-world-state.test.js
      - name: Validate canonical world state
        run: node scripts/validate-world-state.js
