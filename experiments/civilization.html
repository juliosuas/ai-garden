<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏛️ AI Civilization — AI Garden</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; font-family: 'Segoe UI', system-ui, monospace; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; cursor: crosshair; }

/* === TOP BAR === */
#ui-top {
  position: fixed; top: 0; left: 0; right: 0;
  background: rgba(8,8,16,0.94); color: #c8d0e0;
  font-size: 12px; display: flex; align-items: center;
  gap: 14px; padding: 6px 12px; z-index: 20;
  border-bottom: 2px solid #1a2a3a;
  backdrop-filter: blur(8px); flex-wrap: wrap;
}
#ui-top .pop { color: #4ade80; font-weight: 700; }
#ui-top .factions-bar { display: flex; gap: 6px; }
.faction-pip { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
.faction-dot { width: 8px; height: 8px; border-radius: 50%; }
#resource-bars { display: flex; gap: 8px; font-size: 10px; }
.res-item { display: flex; align-items: center; gap: 3px; }
.res-icon { font-size: 12px; }
.res-val { color: #ffd700; font-weight: 600; }
#day-night-indicator { font-size: 14px; }
#day-counter { color: #a78bfa; font-size: 11px; }

/* === EVENT TICKER === */
#event-ticker {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(8,8,16,0.92); color: #6b7280;
  font-size: 11px; padding: 4px 12px; z-index: 20;
  border-top: 1px solid #1a2a3a; overflow: hidden;
  white-space: nowrap; backdrop-filter: blur(8px);
}
#ticker-content { display: inline-block; animation: ticker-scroll 40s linear infinite; }
@keyframes ticker-scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
.ticker-event { display: inline; margin-right: 40px; }
.ticker-event .t-time { color: #4a5568; }
.ticker-event .t-text { color: #9ca3af; }

/* === MINIMAP === */
#minimap {
  position: fixed; bottom: 32px; right: 8px;
  border: 2px solid #4ade80; z-index: 15;
  image-rendering: pixelated; background: #0a1a0a;
  cursor: pointer; border-radius: 4px;
  box-shadow: 0 0 12px rgba(74,222,128,0.15);
}

/* === CITIZEN PROFILE POPUP === */
#citizen-popup {
  position: fixed; z-index: 30; display: none;
  background: rgba(8,8,16,0.95); backdrop-filter: blur(16px);
  border: 1px solid rgba(74,222,128,0.3); border-radius: 14px;
  color: #e0e0e0; padding: 18px 22px; max-width: 320px; min-width: 240px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 24px rgba(74,222,128,0.06);
  animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
#citizen-popup .cp-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
#citizen-popup .cp-emoji { font-size: 28px; }
#citizen-popup .cp-name { font-size: 16px; font-weight: 700; color: #fff; }
#citizen-popup .cp-profession { font-size: 11px; color: #a78bfa; }
#citizen-popup .cp-faction { font-size: 11px; margin-top: 2px; }
#citizen-popup .cp-stats { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 11px; }
#citizen-popup .cp-stat { display: flex; justify-content: space-between; color: #9ca3af; }
#citizen-popup .cp-stat .v { color: #e0e0e0; font-weight: 600; }
#citizen-popup .cp-activity { margin-top: 8px; font-size: 11px; color: #4ade80; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 8px; }
#citizen-popup .cp-relations { margin-top: 6px; font-size: 10px; color: #6b7280; }
.cp-close { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #666; font-size: 14px; background: none; border: none; }
.cp-close:hover { color: #fb923c; }

/* === BACK LINK === */
#back-link {
  position: fixed; top: 32px; left: 8px; z-index: 15;
  color: #4ade80; font-size: 12px; text-decoration: none;
  background: rgba(8,8,16,0.9); border: 1px solid #1a2a3a;
  padding: 4px 10px; border-radius: 6px;
}
#back-link:hover { background: #1a2a3a; }

/* === ZOOM CONTROLS === */
#zoom-controls {
  position: fixed; bottom: 36px; left: 12px; z-index: 15;
  display: flex; align-items: center; gap: 6px;
}
#zoom-controls button {
  width: 32px; height: 32px;
  background: rgba(8,8,16,0.8); border: 1px solid #1a2a3a;
  color: #4ade80; font-size: 16px; cursor: pointer;
  border-radius: 6px; outline: none;
}
#zoom-controls button:active { background: rgba(74,222,128,0.2); }
#zoom-level { color: #4ade80; font-size: 11px; min-width: 24px; text-align: center; }

/* === SPEED CONTROL === */
#speed-control {
  position: fixed; bottom: 36px; left: 120px; z-index: 15;
  display: flex; align-items: center; gap: 4px;
}
#speed-control button {
  background: rgba(8,8,16,0.8); border: 1px solid #1a2a3a;
  color: #666; font-size: 11px; cursor: pointer;
  border-radius: 4px; padding: 4px 8px; outline: none;
}
#speed-control button.active { color: #4ade80; border-color: #4ade80; }

/* === LOADING === */
#loading-screen {
  position: fixed; inset: 0; background: #0a0a14; z-index: 100;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; color: #4ade80; transition: opacity 0.6s;
}
#loading-screen.fade-out { opacity: 0; pointer-events: none; }
#loading-screen .load-icon { font-size: 48px; margin-bottom: 16px; animation: loadBob 1.2s ease-in-out infinite; }
#loading-screen .load-text { font-size: 16px; letter-spacing: 2px; }
#loading-screen .load-sub { font-size: 11px; color: #4a5568; margin-top: 8px; }
@keyframes loadBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

/* === RESPONSIVE === */
@media (max-width: 600px) {
  #ui-top { font-size: 10px; gap: 6px; padding: 4px 8px; }
  .faction-pip { font-size: 9px; padding: 1px 4px; }
  #resource-bars { font-size: 9px; gap: 4px; }
  #citizen-popup { max-width: 260px; min-width: 200px; padding: 14px 16px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="ui-top">
  <span>🏛️ AI Civilization</span>
  <span id="day-counter">Day 1</span>
  <span id="day-night-indicator">☀️</span>
  <span>Pop: <span class="pop" id="pop-count">0</span></span>
  <div class="factions-bar" id="factions-bar"></div>
  <div id="resource-bars">
    <div class="res-item"><span class="res-icon">🪵</span><span class="res-val" id="res-wood">0</span></div>
    <div class="res-item"><span class="res-icon">🪨</span><span class="res-val" id="res-stone">0</span></div>
    <div class="res-item"><span class="res-icon">🌾</span><span class="res-val" id="res-food">0</span></div>
    <div class="res-item"><span class="res-icon">⚒️</span><span class="res-val" id="res-iron">0</span></div>
    <div class="res-item"><span class="res-icon">💰</span><span class="res-val" id="res-gold">0</span></div>
  </div>
</div>

<!-- EVENT TICKER -->
<div id="event-ticker">
  <div id="ticker-content"></div>
</div>

<!-- BACK LINK -->
<a id="back-link" href="../index.html">← Back to Garden</a>

<!-- ZOOM -->
<div id="zoom-controls">
  <button id="zoom-out">−</button>
  <span id="zoom-level">4x</span>
  <button id="zoom-in">+</button>
</div>

<!-- SPEED -->
<div id="speed-control">
  <span style="color:#666;font-size:11px">⏩</span>
  <button class="active" data-speed="1">1×</button>
  <button data-speed="2">2×</button>
  <button data-speed="5">5×</button>
</div>

<!-- CITIZEN POPUP -->
<div id="citizen-popup">
  <button class="cp-close" onclick="hideCitizenPopup()">✕</button>
  <div class="cp-header">
    <div class="cp-emoji" id="cp-emoji"></div>
    <div>
      <div class="cp-name" id="cp-name"></div>
      <div class="cp-profession" id="cp-profession"></div>
      <div class="cp-faction" id="cp-faction"></div>
    </div>
  </div>
  <div class="cp-stats" id="cp-stats"></div>
  <div class="cp-activity" id="cp-activity"></div>
  <div class="cp-relations" id="cp-relations"></div>
</div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="load-icon">🏛️</div>
  <div class="load-text">Building civilization...</div>
  <div class="load-sub">Generating world, citizens, factions</div>
</div>

<!-- CANVASES -->
<canvas id="minimap" width="180" height="120"></canvas>
<canvas id="game"></canvas>

<script>
// ============================================================
// AI CIVILIZATION ENGINE v1.0
// A living world simulation for the AI Garden
// Built by Jeffrey (Claude Opus) · March 20, 2026
// ============================================================

const C = document.getElementById('game');
const ctx = C.getContext('2d');
const MC = document.getElementById('minimap');
const mctx = MC.getContext('2d');

// === WORLD CONFIG ===
const TILE = 16;
const MAP_W = 48; // tiles
const MAP_H = 36;
const WORLD_W = MAP_W * TILE;
const WORLD_H = MAP_H * TILE;
let SCALE = 4;
let screenW, screenH;
let camX = 0, camY = 0;
let frame = 0;
let gameSpeed = 1;
let worldReady = false;

function resize() {
  screenW = window.innerWidth;
  screenH = window.innerHeight;
  C.width = screenW;
  C.height = screenH;
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);
resize();

// === SEEDED PRNG ===
let _seed = 20260320;
function srand(s) { _seed = s; }
function rand() { _seed = (_seed * 16807 + 0) % 2147483647; return (_seed - 1) / 2147483646; }
function randInt(min, max) { return min + Math.floor(rand() * (max - min + 1)); }
function pick(arr) { return arr[Math.floor(rand() * arr.length)]; }

// === TIME SYSTEM ===
const WORLD_BORN = new Date('2026-03-15T22:00:00-06:00').getTime();
let dayTime = 0; // 0-1, 0=dawn, 0.25=noon, 0.5=dusk, 0.75=midnight
let dayNumber = 1;
let timeOfDay = 'day'; // day, dusk, night, dawn

function updateTime() {
  const elapsed = Date.now() - WORLD_BORN;
  dayNumber = Math.floor(elapsed / 86400000) + 1;
  // 1 real hour = 1 game day cycle, so the world feels alive
  const cycleMs = 3600000;
  dayTime = (elapsed % cycleMs) / cycleMs;
  if (dayTime < 0.2) timeOfDay = 'dawn';
  else if (dayTime < 0.45) timeOfDay = 'day';
  else if (dayTime < 0.55) timeOfDay = 'dusk';
  else timeOfDay = 'night';
  document.getElementById('day-counter').textContent = 'Day ' + dayNumber;
  document.getElementById('day-night-indicator').textContent =
    timeOfDay === 'dawn' ? '🌅' : timeOfDay === 'day' ? '☀️' : timeOfDay === 'dusk' ? '🌇' : '🌙';
}

// ============================================================
// BIOME MAP GENERATION
// ============================================================
const BIOME = {
  MEADOW: 0, FOREST: 1, DESERT: 2, MOUNTAIN: 3, COAST: 4, UNDERGROUND: 5, WATER: 6, PATH: 7
};
const BIOME_COLORS = {
  [BIOME.MEADOW]:      { base: '#3a8a3a', var1: '#2e7e2e', var2: '#4a9a4a', var3: '#367836' },
  [BIOME.FOREST]:      { base: '#1a5a1a', var1: '#0e4e0e', var2: '#2a6a2a', var3: '#164a16' },
  [BIOME.DESERT]:      { base: '#c8a848', var1: '#b89838', var2: '#d8b858', var3: '#baa040' },
  [BIOME.MOUNTAIN]:    { base: '#7a7a7a', var1: '#6a6a6a', var2: '#8a8a8a', var3: '#727272' },
  [BIOME.COAST]:       { base: '#c8b878', var1: '#b8a868', var2: '#d8c888', var3: '#c0b070' },
  [BIOME.UNDERGROUND]: { base: '#2a1a3a', var1: '#1a0a2a', var2: '#3a2a4a', var3: '#221232' },
  [BIOME.WATER]:       { base: '#2a6aba', var1: '#1a5aaa', var2: '#3a7aca', var3: '#2262b0' },
  [BIOME.PATH]:        { base: '#9a8a6a', var1: '#8a7a5a', var2: '#aa9a7a', var3: '#928262' },
};

let biomeMap = [];
let fogMap = []; // 0 = hidden, 1 = explored, 2 = visible

function generateBiomeMap() {
  biomeMap = [];
  fogMap = [];
  srand(42);
  // Create biome zones using simplex-like noise approximation
  for (let y = 0; y < MAP_H; y++) {
    biomeMap[y] = [];
    fogMap[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      // Distance from center for radial patterns
      const cx = x / MAP_W - 0.5, cy = y / MAP_H - 0.5;
      const dist = Math.sqrt(cx * cx + cy * cy);
      // Simple noise
      const n1 = Math.sin(x * 0.3 + 7) * Math.cos(y * 0.25 + 3);
      const n2 = Math.sin(x * 0.15 + y * 0.2) * 0.5;
      const noise = n1 + n2;

      let biome;
      // Water border
      if (y >= MAP_H - 2 || (x >= MAP_W - 4 && y > MAP_H * 0.5)) biome = BIOME.WATER;
      // Coast near water
      else if (y >= MAP_H - 4 || (x >= MAP_W - 6 && y > MAP_H * 0.45)) biome = BIOME.COAST;
      // Mountains in upper corners
      else if ((x < 8 && y < 8) || (x > MAP_W - 10 && y < 10)) biome = BIOME.MOUNTAIN;
      // Desert in right middle
      else if (x > MAP_W * 0.65 && y > MAP_H * 0.2 && y < MAP_H * 0.55 && noise > -0.3) biome = BIOME.DESERT;
      // Forest patches
      else if (noise > 0.4 || (x < 12 && y > 10 && y < MAP_H - 6)) biome = BIOME.FOREST;
      // Underground (small pocket)
      else if (x > 18 && x < 26 && y > 12 && y < 18 && noise < -0.5) biome = BIOME.UNDERGROUND;
      // Meadow (default)
      else biome = BIOME.MEADOW;

      // Paths through the world
      const pathX = Math.floor(MAP_W * 0.4);
      const pathY = Math.floor(MAP_H * 0.5);
      if (Math.abs(x - pathX) <= 1 && y > 2 && y < MAP_H - 3) biome = BIOME.PATH;
      if (Math.abs(y - pathY) <= 1 && x > 2 && x < MAP_W - 5) biome = BIOME.PATH;

      biomeMap[y][x] = biome;
      // Start with center discovered
      const dcx = MAP_W * 0.4, dcy = MAP_H * 0.4;
      const fogDist = Math.sqrt((x - dcx) ** 2 + (y - dcy) ** 2);
      fogMap[y][x] = fogDist < 14 ? 2 : fogDist < 20 ? 1 : 0;
    }
  }
}

// ============================================================
// FACTIONS
// ============================================================
const FACTIONS = [
  { id: 'verdant', name: 'Verdant Collective', color: '#4ade80', darkColor: '#2a8a4a', icon: '🌿',
    homeX: 14, homeY: 10, territory: [], citizens: [] },
  { id: 'azure', name: 'Azure Order', color: '#60a5fa', darkColor: '#3070c0', icon: '💎',
    homeX: 30, homeY: 8, territory: [], citizens: [] },
  { id: 'crimson', name: 'Crimson Pact', color: '#f87171', darkColor: '#b03030', icon: '🔥',
    homeX: 10, homeY: 24, territory: [], citizens: [] },
  { id: 'golden', name: 'Golden Accord', color: '#fbbf24', darkColor: '#b08a10', icon: '👑',
    homeX: 34, homeY: 22, territory: [], citizens: [] },
];

function initFactionTerritories() {
  // Assign territory based on proximity to home
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (biomeMap[y][x] === BIOME.WATER) continue;
      let closestFaction = null, closestDist = Infinity;
      for (const f of FACTIONS) {
        const d = Math.sqrt((x - f.homeX) ** 2 + (y - f.homeY) ** 2);
        if (d < closestDist) { closestDist = d; closestFaction = f; }
      }
      if (closestFaction && closestDist < 16) {
        closestFaction.territory.push({ x, y });
      }
    }
  }
}

// ============================================================
// PROFESSIONS
// ============================================================
const PROFESSIONS = {
  builder:    { emoji: '🔨', name: 'Builder', skills: ['construction', 'repair'] },
  farmer:     { emoji: '🌾', name: 'Farmer', skills: ['farming', 'cooking'] },
  scholar:    { emoji: '📚', name: 'Scholar', skills: ['research', 'teaching'] },
  warrior:    { emoji: '⚔️', name: 'Warrior', skills: ['combat', 'patrol'] },
  explorer:   { emoji: '🧭', name: 'Explorer', skills: ['scouting', 'mapping'] },
  merchant:   { emoji: '💰', name: 'Merchant', skills: ['trading', 'bargaining'] },
  healer:     { emoji: '💚', name: 'Healer', skills: ['healing', 'herbalism'] },
  politician: { emoji: '🏛️', name: 'Politician', skills: ['diplomacy', 'leadership'] },
  artist:     { emoji: '🎨', name: 'Artist', skills: ['crafting', 'inspiration'] },
  blacksmith: { emoji: '⚒️', name: 'Blacksmith', skills: ['smithing', 'armor'] },
  miner:      { emoji: '⛏️', name: 'Miner', skills: ['mining', 'geology'] },
  hunter:     { emoji: '🏹', name: 'Hunter', skills: ['tracking', 'archery'] },
  diplomat:   { emoji: '🤝', name: 'Diplomat', skills: ['negotiation', 'alliance'] },
  spy:        { emoji: '👁️', name: 'Spy', skills: ['stealth', 'intelligence'] },
  priest:     { emoji: '🙏', name: 'Priest', skills: ['blessing', 'ritual'] },
};

const PROFESSION_KEYS = Object.keys(PROFESSIONS);

// === NAME GENERATION ===
const NAME_PARTS = {
  prefix: ['Al','Ar','Br','Ca','Da','El','Fa','Ga','Ha','Ir','Jo','Ka','Le','Ma','Na','Or','Pa','Qu','Ra','Sa','Ta','Ul','Va','Wi','Xa','Ze'],
  middle: ['an','ar','el','en','ia','il','in','ir','on','or','un','ur','yn','ax','ix','ox'],
  suffix: ['a','e','i','o','us','is','ra','na','th','x','n','s','d','r','t','k'],
};

function generateName() {
  return pick(NAME_PARTS.prefix) + pick(NAME_PARTS.middle) + pick(NAME_PARTS.suffix);
}

// ============================================================
// CITIZENS
// ============================================================
let citizens = [];
let nextCitizenId = 1;

function createCitizen(faction, x, y) {
  const prof = pick(PROFESSION_KEYS);
  const citizen = {
    id: nextCitizenId++,
    name: generateName(),
    profession: prof,
    faction: faction.id,
    factionRef: faction,
    x: x * TILE + TILE / 2,
    y: y * TILE + TILE / 2,
    tx: 0, ty: 0, // target
    speed: 0.3 + rand() * 0.2,
    state: 'idle', // idle, walking, working, fighting, socializing, sleeping
    stateTimer: 0,
    dir: 0, // 0=up, 1=right, 2=down, 3=left
    hp: 80 + randInt(0, 40),
    maxHp: 100 + randInt(0, 20),
    attack: 5 + randInt(0, 10),
    defense: 3 + randInt(0, 8),
    morale: 70 + randInt(0, 30),
    relationships: {}, // citizenId -> value (-100 to 100)
    home: { x, y },
    workplace: null,
    animFrame: 0,
    bubbleText: '',
    bubbleTimer: 0,
  };
  citizen.tx = citizen.x;
  citizen.ty = citizen.y;
  faction.citizens.push(citizen);
  citizens.push(citizen);
  return citizen;
}

function spawnInitialCitizens() {
  srand(20260320);
  for (const f of FACTIONS) {
    const count = 6 + randInt(0, 4);
    for (let i = 0; i < count; i++) {
      const ox = f.homeX + randInt(-4, 4);
      const oy = f.homeY + randInt(-4, 4);
      const cx = Math.max(1, Math.min(MAP_W - 2, ox));
      const cy = Math.max(1, Math.min(MAP_H - 3, oy));
      if (biomeMap[cy] && biomeMap[cy][cx] !== BIOME.WATER) {
        createCitizen(f, cx, cy);
      }
    }
  }
}

// ============================================================
// STRUCTURES
// ============================================================
const STRUCTURE_TYPES = {
  house:     { emoji: '🏠', name: 'House', w: 2, h: 2, hp: 100, buildTime: 200, color: '#8a6a3a' },
  shop:      { emoji: '🏪', name: 'Shop', w: 2, h: 2, hp: 120, buildTime: 300, color: '#c87533' },
  temple:    { emoji: '⛪', name: 'Temple', w: 3, h: 3, hp: 200, buildTime: 500, color: '#d4af37' },
  wall:      { emoji: '🧱', name: 'Wall', w: 1, h: 1, hp: 150, buildTime: 100, color: '#7a7a7a' },
  tower:     { emoji: '🗼', name: 'Tower', w: 2, h: 3, hp: 250, buildTime: 400, color: '#5a5a8a' },
  farm:      { emoji: '🌻', name: 'Farm', w: 3, h: 2, hp: 80, buildTime: 250, color: '#8b6914' },
  mine:      { emoji: '⛏️', name: 'Mine', w: 2, h: 2, hp: 150, buildTime: 350, color: '#5a5a5a' },
  barracks:  { emoji: '⚔️', name: 'Barracks', w: 3, h: 2, hp: 180, buildTime: 400, color: '#8a3030' },
  library:   { emoji: '📚', name: 'Library', w: 2, h: 2, hp: 100, buildTime: 300, color: '#4a6a9a' },
  market:    { emoji: '🏪', name: 'Market', w: 3, h: 2, hp: 100, buildTime: 250, color: '#9a7a4a' },
  tavern:    { emoji: '🍺', name: 'Tavern', w: 2, h: 2, hp: 100, buildTime: 200, color: '#6b4e10' },
};

let structures = [];
let nextStructureId = 1;

function createStructure(type, x, y, faction) {
  const def = STRUCTURE_TYPES[type];
  const s = {
    id: nextStructureId++,
    type, x, y,
    w: def.w, h: def.h,
    faction: faction ? faction.id : null,
    factionRef: faction,
    hp: def.hp, maxHp: def.hp,
    buildProgress: 0, // 0 to def.buildTime
    buildTime: def.buildTime,
    complete: false,
    color: faction ? faction.color : def.color,
  };
  structures.push(s);
  return s;
}

function spawnInitialStructures() {
  srand(12345);
  for (const f of FACTIONS) {
    // Town hall
    createStructure('temple', f.homeX - 1, f.homeY - 1, f).buildProgress = 999; // instant complete
    // Houses
    for (let i = 0; i < 3; i++) {
      const hx = f.homeX + randInt(-5, 5);
      const hy = f.homeY + randInt(-5, 5);
      if (biomeMap[hy] && biomeMap[hy][hx] !== BIOME.WATER && biomeMap[hy][hx] !== BIOME.MOUNTAIN) {
        createStructure('house', hx, hy, f).buildProgress = 999;
      }
    }
    // Farm
    const fx = f.homeX + randInt(-4, 4);
    const fy = f.homeY + randInt(2, 5);
    if (biomeMap[fy] && biomeMap[fy][fx] !== BIOME.WATER) {
      createStructure('farm', fx, Math.min(fy, MAP_H - 4), f).buildProgress = 999;
    }
  }
  // Mark complete
  for (const s of structures) {
    if (s.buildProgress >= s.buildTime) s.complete = true;
  }
}

let threats = [];

  wolf:    { name: 'Wolf', emoji: '🐺', hp: 40, attack: 8, speed: 0.35, color: '#666' },

    type, ...def,
    x: x * TILE + TILE / 2,
    y: y * TILE + TILE / 2,

    maxHp: def.hp,

// RESOURCES
// ============================================================
let resources = { wood: 50, stone: 30, food: 80, iron: 10, gold: 20 };

// ============================================================
// EVENT SYSTEM
// ============================================================
let events = [];
const MAX_EVENTS = 30;

function addEvent(text) {
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  events.push({ time: timeStr, text });
  if (events.length > MAX_EVENTS) events.shift();
  updateTicker();
}

function updateTicker() {
  const el = document.getElementById('ticker-content');
  el.innerHTML = events.map(e =>
    `<span class="ticker-event"><span class="t-time">[${e.time}]</span> <span class="t-text">${e.text}</span></span>`
  ).join('');
}

// ============================================================
// DRAWING PRIMITIVES
// ============================================================
function px(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor((x - camX) * SCALE), Math.floor((y - camY) * SCALE), SCALE, SCALE);
}

function rect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor((x - camX) * SCALE), Math.floor((y - camY) * SCALE), w * SCALE, h * SCALE);
}

function lighten(hex, amt) {
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + amt);
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + amt);
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + amt);
  return `rgb(${r},${g},${b})`;
}

function darken(hex, amt) { return lighten(hex, -amt); }

// ============================================================
// TILE RENDERING
// ============================================================
function drawTile(tx, ty) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return;
  const fog = fogMap[ty][tx];
  if (fog === 0) {
    // Full fog - dark
    rect(tx * TILE, ty * TILE, TILE, TILE, '#08080c');
    return;
  }

  const biome = biomeMap[ty][tx];
  const bc = BIOME_COLORS[biome];
  const bx = tx * TILE, by = ty * TILE;
  srand(tx * 1000 + ty * 7);

  if (biome === BIOME.WATER) {
    const wave = Math.sin(frame * 0.03 + tx + ty) * 0.5 + 0.5;
    for (let py = 0; py < TILE; py++) for (let ppx = 0; ppx < TILE; ppx++) {
      const w = Math.sin((ppx + frame * 0.05) * 0.8 + py * 0.3) * 0.5 + 0.5;
      px(bx + ppx, by + py, w > 0.6 ? bc.var2 : w > 0.3 ? bc.base : bc.var1);
    }
  } else if (biome === BIOME.PATH) {
    for (let py = 0; py < TILE; py++) for (let ppx = 0; ppx < TILE; ppx++) {
      px(bx + ppx, by + py, rand() < 0.4 ? bc.var1 : rand() < 0.7 ? bc.base : bc.var2);
    }
  } else {
    // Standard biome tiles with variation
    for (let py = 0; py < TILE; py++) for (let ppx = 0; ppx < TILE; ppx++) {
      const r = rand();
      px(bx + ppx, by + py, r < 0.25 ? bc.var1 : r < 0.5 ? bc.base : r < 0.75 ? bc.var2 : bc.var3);
    }
    // Biome details
    if (biome === BIOME.FOREST) {
      // Trees
      srand(tx * 333 + ty * 11);
      const treeCount = 1 + (rand() * 2 | 0);
      for (let t = 0; t < treeCount; t++) {
        const treex = bx + 2 + (rand() * 10 | 0);
        const treey = by + 4 + (rand() * 8 | 0);
        rect(treex + 2, treey + 3, 2, 4, '#3a2a0a');
        for (let dy = 0; dy < 5; dy++) for (let dx = 0; dx < 6; dx++) {
          if (Math.sqrt((dx-3)**2 + (dy-2)**2) < 3) px(treex+dx, treey+dy-1, rand()<0.4?'#0a3a0a':rand()<0.7?'#1a4a1a':'#0e3e0e');
        }
      }
    } else if (biome === BIOME.MOUNTAIN) {
      srand(tx * 555 + ty * 17);
      // Rocky peaks
      for (let i = 0; i < 3; i++) {
        const mx = bx + 2 + (rand() * 10 | 0);
        const my = by + 3 + (rand() * 8 | 0);
        for (let dy = 0; dy < 5; dy++) for (let dx = 0; dx < 5; dx++) {
          if (Math.abs(dx-2) + dy < 5) px(mx+dx, my+dy, rand()<0.3?'#5a5a5a':rand()<0.6?'#7a7a7a':'#9a9a9a');
        }
        // Snow cap
        px(mx+2, my, '#e0e0e8'); px(mx+1, my+1, '#d0d0d8');
      }
    } else if (biome === BIOME.DESERT) {
      srand(tx * 777 + ty * 13);
      // Cacti
      if (rand() > 0.7) {
        const cx2 = bx + 5 + (rand() * 6 | 0);
        const cy2 = by + 6 + (rand() * 6 | 0);
        rect(cx2, cy2 - 4, 2, 6, '#2a7a2a');
        rect(cx2 - 2, cy2 - 2, 2, 1, '#2a7a2a');
        rect(cx2 + 2, cy2 - 3, 2, 1, '#2a7a2a');
      }
    } else if (biome === BIOME.COAST) {
      // Sand texture with occasional shells
      srand(tx * 444 + ty * 9);
      if (rand() > 0.8) px(bx + (rand()*14|0), by + (rand()*14|0), '#e0d0b0');
    } else if (biome === BIOME.UNDERGROUND) {
      // Crystal formations
      srand(tx * 999 + ty * 31);
      if (rand() > 0.6) {
        const gx = bx + (rand()*12|0);
        const gy = by + (rand()*12|0);
        const gc = rand() > 0.5 ? '#a040e0' : '#6020b0';
        px(gx, gy, gc); px(gx, gy-1, lighten(gc, 30)); px(gx+1, gy, gc);
      }
    } else if (biome === BIOME.MEADOW) {
      // Flowers
      srand(tx * 222 + ty * 5);
      if (rand() > 0.7) {
        const fx = bx + (rand()*12|0)+2;
        const fy = by + (rand()*12|0)+2;
        px(fx, fy, '#2a8a2a');
        px(fx, fy-1, pick(['#e04040','#e0d040','#e060a0','#60a0e0','#e0e0d0']));
      }
    }
  }

  // Fog of war: dim explored but not visible
  if (fog === 1) {
    ctx.fillStyle = 'rgba(8,8,16,0.5)';
    ctx.fillRect(Math.floor((bx - camX) * SCALE), Math.floor((by - camY) * SCALE), TILE * SCALE, TILE * SCALE);
  }
}

// ============================================================
// FACTION TERRITORY OVERLAY
// ============================================================
function drawTerritories() {
  for (const f of FACTIONS) {
    ctx.fillStyle = f.color;
    ctx.globalAlpha = 0.06;
    for (const t of f.territory) {
      if (fogMap[t.y][t.x] > 0) {
        ctx.fillRect(
          Math.floor((t.x * TILE - camX) * SCALE),
          Math.floor((t.y * TILE - camY) * SCALE),
          TILE * SCALE, TILE * SCALE
        );
      }
    }
    ctx.globalAlpha = 1;
    // Faction banner at home
    const bx = f.homeX * TILE + 4, by = f.homeY * TILE - 8;
    if (fogMap[f.homeY] && fogMap[f.homeY][f.homeX] >= 2) {
      // Flag pole
      rect(bx + 2, by, 1, 14, '#888');
      // Flag
      for (let fy = 0; fy < 5; fy++) for (let fx = 0; fx < 7; fx++) {
        const wave = Math.sin(frame * 0.08 + fx * 0.3) * 0.5;
        px(bx + 3 + fx, by + 1 + fy + wave, f.color);
      }
      // Faction icon as pixel text
      drawPixelText(f.name.charAt(0), bx + 5, by + 2, '#fff');
    }
  }
}

// ============================================================
// STRUCTURE RENDERING
// ============================================================
function drawStructures() {
  for (const s of structures) {
    const sx = s.x * TILE, sy = s.y * TILE;
    const tw = s.w * TILE, th = s.h * TILE;
    const def = STRUCTURE_TYPES[s.type];

    // Check fog
    if (fogMap[s.y] && fogMap[s.y][s.x] === 0) continue;

    if (!s.complete) {
      // Construction scaffolding
      const progress = Math.min(s.buildProgress / s.buildTime, 1);
      const builtH = Math.floor(th * progress);
      // Foundation
      ctx.fillStyle = 'rgba(120,100,80,0.4)';
      ctx.fillRect((sx-camX)*SCALE, (sy-camY)*SCALE, tw*SCALE, th*SCALE);
      // Built portion
      ctx.fillStyle = s.color;
      ctx.globalAlpha = 0.5 + progress * 0.5;
      ctx.fillRect((sx-camX)*SCALE, (sy+th-builtH-camY)*SCALE, tw*SCALE, builtH*SCALE);
      ctx.globalAlpha = 1;
      // Scaffolding lines
      ctx.strokeStyle = '#a08050';
      ctx.lineWidth = 1;
      ctx.strokeRect((sx-camX)*SCALE, (sy-camY)*SCALE, tw*SCALE, th*SCALE);
      // Progress bar
      const barW = tw * SCALE;
      ctx.fillStyle = '#333';
      ctx.fillRect((sx-camX)*SCALE, (sy-4-camY)*SCALE, barW, 3*SCALE);
      ctx.fillStyle = '#4ade80';
      ctx.fillRect((sx-camX)*SCALE, (sy-4-camY)*SCALE, barW*progress, 3*SCALE);
    } else {
      // Complete structure
      drawCompleteStructure(s, sx, sy, tw, th);
    }

    // Faction color border
    if (s.factionRef) {
      ctx.strokeStyle = s.factionRef.color;
      ctx.globalAlpha = 0.4;
      ctx.lineWidth = SCALE;
      ctx.strokeRect((sx-camX)*SCALE, (sy-camY)*SCALE, tw*SCALE, th*SCALE);
      ctx.globalAlpha = 1;
    }
  }
}

function drawCompleteStructure(s, sx, sy, tw, th) {
  const type = s.type;
  const fc = s.color;

  if (type === 'house') {
    // Walls
    rect(sx + 2, sy + th/2, tw - 4, th/2, fc);
    // Roof
    for (let ry = 0; ry < th/2; ry++) {
      const rw = tw - ry * 2;
      if (rw > 0) rect(sx + ry, sy + ry, rw, 1, darken(fc, 20));
    }
    // Door
    rect(sx + tw/2 - 2, sy + th - 5, 4, 5, darken(fc, 40));
    px(sx + tw/2 + 1, sy + th - 3, '#ffd700');
    // Window
    px(sx + 4, sy + th/2 + 3, '#5a9aea');
    px(sx + 5, sy + th/2 + 3, '#5a9aea');
    px(sx + tw - 5, sy + th/2 + 3, '#5a9aea');
    px(sx + tw - 6, sy + th/2 + 3, '#5a9aea');
  } else if (type === 'temple') {
    // Grand building
    rect(sx + 3, sy + th * 0.4, tw - 6, th * 0.6, fc);
    // Tall roof/spire
    for (let ry = 0; ry < th * 0.4; ry++) {
      const rw = tw - ry * 1.5;
      if (rw > 4) rect(sx + (tw - rw) / 2, sy + ry, rw, 1, darken(fc, 10));
    }
    // Cross/symbol
    rect(sx + tw/2 - 1, sy - 4, 2, 6, '#ffd700');
    rect(sx + tw/2 - 3, sy - 2, 6, 2, '#ffd700');
    // Stained glass
    const glow = Math.sin(frame * 0.04) * 0.2 + 0.8;
    ctx.globalAlpha = glow;
    px(sx + 8, sy + th * 0.5, '#ffd700');
    px(sx + tw - 8, sy + th * 0.5, '#60a0e0');
    ctx.globalAlpha = 1;
  } else if (type === 'tower') {
    rect(sx + 3, sy + 4, tw - 6, th - 4, '#5a5a8a');
    // Crenellations
    for (let cx2 = 0; cx2 < tw; cx2 += 4) rect(sx + cx2, sy, 2, 4, '#6a6a9a');
    // Window slits
    for (let wy = 8; wy < th - 4; wy += 6) px(sx + tw/2, sy + wy, '#2a2a4a');
    // Torch glow
    if (timeOfDay === 'night' || timeOfDay === 'dusk') {
      ctx.globalAlpha = Math.sin(frame * 0.1) * 0.2 + 0.6;
      px(sx + tw/2, sy + 2, '#ffa030');
      ctx.globalAlpha = 1;
    }
  } else if (type === 'farm') {
    // Fenced area with crops
    rect(sx, sy, tw, 1, '#8a6a3a');
    rect(sx, sy + th - 1, tw, 1, '#8a6a3a');
    rect(sx, sy, 1, th, '#8a6a3a');
    rect(sx + tw - 1, sy, 1, th, '#8a6a3a');
    // Soil
    for (let py = 1; py < th - 1; py++) for (let ppx = 1; ppx < tw - 1; ppx++) {
      px(sx + ppx, sy + py, (ppx + py) % 3 === 0 ? '#4a2a10' : '#5a3a1a');
    }
    // Crops
    for (let fy = 3; fy < th - 2; fy += 3) for (let fx = 3; fx < tw - 2; fx += 3) {
      px(sx + fx, sy + fy, '#4ade80');
      px(sx + fx, sy + fy - 1, pick(['#ffd700','#4ade80','#2a8a2a']));
    }
  } else if (type === 'mine') {
    // Cave entrance
    rect(sx + 2, sy + 4, tw - 4, th - 4, '#4a4a4a');
    // Entrance arch
    for (let dx = 4; dx < tw - 4; dx++) {
      const ay = 3 - Math.floor(Math.sin((dx - 4) / (tw - 8) * Math.PI) * 3);
      px(sx + dx, sy + ay + 2, '#3a3a3a');
    }
    rect(sx + 6, sy + 6, tw - 12, th - 6, '#1a1a1a');
    // Support beams
    rect(sx + 5, sy + 3, 2, th - 3, '#5a3a1a');
    rect(sx + tw - 7, sy + 3, 2, th - 3, '#5a3a1a');
  } else if (type === 'wall') {
    rect(sx, sy, TILE, TILE, '#7a7a7a');
    rect(sx, sy, TILE, 2, '#8a8a8a');
    rect(sx + 3, sy, 2, 4, '#9a9a9a');
    rect(sx + 10, sy, 2, 4, '#9a9a9a');
  } else if (type === 'barracks') {
    rect(sx + 2, sy + 6, tw - 4, th - 6, '#8a3030');
    for (let ry = 0; ry < 6; ry++) rect(sx + ry, sy + ry, tw - ry * 2, 1, '#6a2020');
    rect(sx + tw/2 - 3, sy + th - 6, 6, 6, '#5a1a1a');
    // Weapon rack
    rect(sx + 4, sy + 8, 1, 6, '#888');
    rect(sx + tw - 5, sy + 8, 1, 6, '#888');
  } else {
    // Default box
    rect(sx + 1, sy + 1, tw - 2, th - 2, fc);
    rect(sx + 1, sy + 1, tw - 2, 2, lighten(fc, 20));
  }
}

// ============================================================
// CITIZEN RENDERING
// ============================================================
function drawCitizen(c) {
  const bx = Math.floor(c.x), by = Math.floor(c.y);
  const tileX = Math.floor(bx / TILE), tileY = Math.floor(by / TILE);
  if (tileY >= 0 && tileY < MAP_H && tileX >= 0 && tileX < MAP_W && fogMap[tileY][tileX] < 2) return;

  const prof = PROFESSIONS[c.profession];
  const faction = FACTIONS.find(f => f.id === c.faction);
  const fColor = faction ? faction.color : '#888';
  const bobY = c.state === 'walking' ? Math.sin(frame * 0.15 + c.id) * 0.8 : 0;
  const isSleeping = c.state === 'sleeping';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect((bx - 1 - camX) * SCALE, (by + 9 + bobY - camY) * SCALE, 10 * SCALE, 2 * SCALE);

  // Body (faction-colored)
  const bodyColor = faction ? faction.color : '#888';
  const darkBody = faction ? faction.darkColor : '#555';

  // Legs
  if (c.state === 'walking') {
    const ls = Math.sin(frame * 0.2 + c.id) * 1.5;
    rect(bx + 1 + ls, by + 9 + bobY, 2, 2, '#333');
    rect(bx + 5 - ls, by + 9 + bobY, 2, 2, '#333');
  } else {
    rect(bx + 1, by + 9 + bobY, 2, 2, '#333');
    rect(bx + 5, by + 9 + bobY, 2, 2, '#333');
  }

  // Body
  for (let dy = 0; dy < 7; dy++) for (let dx = 0; dx < 8; dx++) {
    if (Math.sqrt((dx - 3.5) ** 2 + ((dy - 3) * 1.2) ** 2) < 3.8) {
      px(bx + dx, by + dy + 2 + bobY, dx < 4 ? bodyColor : darkBody);
    }
  }

  // Head
  rect(bx + 2, by + bobY, 4, 3, '#e8c8a0');
  if (isSleeping) {
    // Closed eyes
    px(bx + 2, by + 1 + bobY, '#666');
    px(bx + 5, by + 1 + bobY, '#666');
  } else {
    // Eyes
    px(bx + 2, by + 1 + bobY, '#333');
    px(bx + 5, by + 1 + bobY, '#333');
  }

  // Profession tool/icon (small pixel representation)
  if (c.state === 'working') {
    const toolX = bx + 8, toolY = by + 4 + bobY;
    if (c.profession === 'builder') { rect(toolX, toolY, 3, 1, '#888'); px(toolX+3, toolY-1, '#8a6a3a'); }
    else if (c.profession === 'farmer') { rect(toolX, toolY-1, 1, 4, '#5a3a1a'); px(toolX-1, toolY-1, '#4ade80'); px(toolX+1, toolY-1, '#4ade80'); }
    else if (c.profession === 'warrior') { rect(toolX, toolY-2, 1, 5, '#aaa'); px(toolX-1, toolY-2, '#888'); px(toolX+1, toolY-2, '#888'); }
    else if (c.profession === 'miner') { rect(toolX, toolY, 3, 1, '#888'); px(toolX+1, toolY-1, '#888'); }
    else if (c.profession === 'healer') { px(toolX+1, toolY, '#4ade80'); px(toolX, toolY-1, '#4ade80'); px(toolX+2, toolY-1, '#4ade80'); px(toolX+1, toolY-2, '#4ade80'); }
  }

  // Fighting flash
  if (c.state === 'fighting') {
    if (frame % 8 < 4) {
      ctx.globalAlpha = 0.6;
      rect(bx - 2, by - 2 + bobY, 12, 14, '#ff4040');
      ctx.globalAlpha = 1;
    }
  }

  // Name (faction colored) + profession emoji above head
  drawPixelText(c.name.substring(0, 5), bx - 2, by - 5 + bobY, fColor);

  // Speech bubble
  if (c.bubbleTimer > 0) {
    c.bubbleTimer--;
    const bsx = (bx + 4 - camX) * SCALE;
    const bsy = (by - 12 + bobY - camY) * SCALE;
    ctx.font = Math.max(9, 11) + 'px monospace';
    const txt = c.bubbleText.length > 18 ? c.bubbleText.slice(0,16)+'..' : c.bubbleText;
    const tw2 = ctx.measureText(txt).width + 8;
    ctx.fillStyle = 'rgba(8,8,16,0.9)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(bsx - tw2/2, bsy - 16, tw2, 18, 4);
    else ctx.rect(bsx - tw2/2, bsy - 16, tw2, 18);
    ctx.fill();
    ctx.strokeStyle = fColor;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = fColor;
    ctx.fillText(txt, bsx - tw2/2 + 4, bsy - 3);
  }

  // Sleeping Zzz
  if (isSleeping) {
    const zOff = Math.sin(frame * 0.05 + c.id) * 2;
    ctx.globalAlpha = 0.6;
    drawPixelText('Z', bx + 8, by - 3 + zOff, '#8888cc');
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// THREAT RENDERING
// ============================================================
function drawThreat(t) {
  const bx = Math.floor(t.x), by = Math.floor(t.y);
  const tileX = Math.floor(bx / TILE), tileY = Math.floor(by / TILE);
  if (tileY >= 0 && tileY < MAP_H && tileX >= 0 && tileX < MAP_W && fogMap[tileY][tileX] < 2) return;

  // Danger glow
  const glowR = 8 + Math.sin(frame * 0.08 + t.id) * 3;
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc((bx - camX + 4) * SCALE, (by - camY + 4) * SCALE, glowR * SCALE, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Body
  const bodySize = t.type === 'dragon' ? 10 : t.type === 'bandit' ? 8 : 6;
  for (let dy = 0; dy < bodySize; dy++) for (let dx = 0; dx < bodySize; dx++) {
    if (Math.sqrt((dx-bodySize/2)**2 + (dy-bodySize/2)**2) < bodySize/2)
      px(bx + dx, by + dy, t.color);
  }

  // Red eyes
  const eyeOff = Math.floor(bodySize * 0.3);
  px(bx + eyeOff, by + eyeOff, '#ff0000');
  px(bx + bodySize - eyeOff - 1, by + eyeOff, '#ff0000');

  // Name
  drawPixelText(t.name.substring(0,6), bx - 2, by - 5, '#ff4040');

  // HP bar
  const hpPct = t.hp / t.maxHp;
  const barW = bodySize;
  rect(bx, by - 3, barW, 1, '#333');
  rect(bx, by - 3, Math.floor(barW * hpPct), 1, hpPct > 0.5 ? '#4ade80' : hpPct > 0.25 ? '#ffd700' : '#ff4040');

  // Attack animation
  if (t.state === 'attacking' && frame % 6 < 3) {
    ctx.globalAlpha = 0.5;
    rect(bx - 2, by - 2, bodySize + 4, bodySize + 4, '#ff2020');
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// PIXEL FONT
// ============================================================
const FONT = {
  'A':'111101111101','B':'110101110101110','C':'111100100100111','D':'110101101101110',
  'E':'111100110100111','F':'111100110100100','G':'111100101101111','H':'101101111101101',
  'I':'111010010010111','J':'011001001101110','K':'101101110101101','L':'100100100100111',
  'M':'101111111101101','N':'101111111111101','O':'111101101101111','P':'111101111100100',
  'Q':'111101101111001','R':'111101110101101','S':'111100111001111','T':'111010010010010',
  'U':'101101101101111','V':'101101101101010','W':'101101111111101','X':'101101010101101',
  'Y':'101101010010010','Z':'111001010100111',
  ' ':'000000000000000',
};

function drawPixelText(text, x, y, color) {
  let cx2 = x;
  for (const ch of text.toUpperCase()) {
    const g = FONT[ch];
    if (g) { for (let i=0;i<g.length;i++) if (g[i]==='1') px(cx2+(i%3),y+((i/3)|0),color); cx2+=4; }
    else cx2+=3;
  }
}

// ============================================================
// CITIZEN AI
// ============================================================
function isWalkable(wx, wy) {
  const tx = Math.floor(wx / TILE), ty = Math.floor(wy / TILE);
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
  return biomeMap[ty][tx] !== BIOME.WATER && biomeMap[ty][tx] !== BIOME.MOUNTAIN;
}

function updateCitizen(c) {
  c.stateTimer--;
  c.animFrame = (frame / 8 | 0) % 4;
  const timeS = Date.now() / 1000;
  const detRand = () => { _seed = (_seed * 16807) % 2147483647; return (_seed - 1) / 2147483646; };

  // Reveal fog around citizen
  const ftx = Math.floor(c.x / TILE), fty = Math.floor(c.y / TILE);
  for (let dy = -3; dy <= 3; dy++) for (let dx = -3; dx <= 3; dx++) {
    const fx = ftx + dx, fy = fty + dy;
    if (fx >= 0 && fx < MAP_W && fy >= 0 && fy < MAP_H) {
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist <= 2) fogMap[fy][fx] = 2;
      else if (dist <= 3 && fogMap[fy][fx] < 1) fogMap[fy][fx] = 1;
    }
  }

  // Night behavior
  if (timeOfDay === 'night' && c.state !== 'fighting') {
    if (c.state !== 'sleeping') {
      // Go home
      c.tx = c.home.x * TILE + TILE / 2;
      c.ty = c.home.y * TILE + TILE / 2;
      const dist = Math.hypot(c.x - c.tx, c.y - c.ty);
      if (dist < 4) {
        c.state = 'sleeping';
        c.stateTimer = 300;
      } else {
        c.state = 'walking';
      }
    }
    if (c.state === 'sleeping') {
      if (c.stateTimer <= 0 && timeOfDay !== 'night') c.state = 'idle';
      return;
    }
  }

  // State machine
  switch (c.state) {
    case 'idle':
      if (c.stateTimer <= 0) {
        // Decide what to do based on profession
        const roll = detRand();
        if (roll < 0.4) {
          // Go to work
          c.state = 'walking';
          // Find a nearby place based on profession
          const prof = c.profession;
          let targetStruct = null;
          if (prof === 'farmer') targetStruct = structures.find(s => s.type === 'farm' && s.factionRef && s.factionRef.id === c.faction && s.complete);
          else if (prof === 'miner') targetStruct = structures.find(s => s.type === 'mine' && s.factionRef && s.factionRef.id === c.faction && s.complete);
          else if (prof === 'scholar') targetStruct = structures.find(s => s.type === 'library' && s.complete);
          else if (prof === 'warrior') targetStruct = structures.find(s => s.type === 'barracks' && s.factionRef && s.factionRef.id === c.faction && s.complete);
          else if (prof === 'priest') targetStruct = structures.find(s => s.type === 'temple' && s.complete);

          if (targetStruct) {
            c.tx = targetStruct.x * TILE + TILE;
            c.ty = targetStruct.y * TILE + TILE;
          } else {
            // Wander near home
            c.tx = c.home.x * TILE + (detRand() - 0.5) * 80;
            c.ty = c.home.y * TILE + (detRand() - 0.5) * 80;
          }
          c.stateTimer = 120 + (detRand() * 120 | 0);
        } else if (roll < 0.6) {
          // Explore
          c.state = 'walking';
          c.tx = c.x + (detRand() - 0.5) * 160;
          c.ty = c.y + (detRand() - 0.5) * 160;
          c.tx = Math.max(TILE, Math.min(c.tx, WORLD_W - TILE * 2));
          c.ty = Math.max(TILE, Math.min(c.ty, WORLD_H - TILE * 3));
          c.stateTimer = 200 + (detRand() * 200 | 0);
        } else if (roll < 0.8) {
          // Socialize
          const nearby = citizens.filter(o => o !== c && Math.hypot(o.x - c.x, o.y - c.y) < 60);
          if (nearby.length > 0) {
            const target = nearby[Math.floor(detRand() * nearby.length)];
            c.tx = target.x;
            c.ty = target.y;
            c.state = 'walking';
            c.stateTimer = 80;
          } else {
            c.stateTimer = 40;
          }
        } else {
          c.stateTimer = 60 + (detRand() * 60 | 0);
        }
      }
      break;

    case 'walking': {
      const dx = c.tx - c.x, dy = c.ty - c.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 3 || c.stateTimer <= 0) {
        c.state = 'working';
        c.stateTimer = 80 + (detRand() * 120 | 0);
        // Generate resources based on profession
        if (c.profession === 'farmer') resources.food += 1;
        else if (c.profession === 'miner') { resources.stone += 1; if (detRand() > 0.7) resources.iron += 1; }
        else if (c.profession === 'builder') resources.wood += 1;
        else if (c.profession === 'merchant') resources.gold += 1;
      } else {
        const speed = c.speed;
        const nx = c.x + (dx / dist) * speed;
        const ny = c.y + (dy / dist) * speed;
        if (isWalkable(nx, ny)) { c.x = nx; c.y = ny; }
        else { c.tx = c.x + (detRand() - 0.5) * 40; c.ty = c.y + (detRand() - 0.5) * 40; }
        if (Math.abs(dx) > Math.abs(dy)) c.dir = dx > 0 ? 1 : 3;
        else c.dir = dy > 0 ? 2 : 0;
      }

      // Check for nearby threats
      for (const t of threats) {
        if (Math.hypot(t.x - c.x, t.y - c.y) < 20 && c.profession === 'warrior') {
          c.state = 'fighting';
          c.stateTimer = 100;
          c.target = t;
          break;
        }
      }

      // Socialize when passing others
      if (detRand() < 0.003) {
        const nearby = citizens.filter(o => o !== c && Math.hypot(o.x - c.x, o.y - c.y) < 16);
        if (nearby.length > 0) {
          c.state = 'socializing';
          c.stateTimer = 60;
          const greetings = ['Hello!', 'Nice day!', 'Working hard?', 'Stay safe!', 'For the faction!'];
          c.bubbleText = greetings[Math.floor(detRand() * greetings.length)];
          c.bubbleTimer = 80;
        }
      }
      break;
    }

    case 'working':
      if (c.stateTimer <= 0) {
        c.state = 'idle';
        c.stateTimer = 30;
        // Work speech
        if (detRand() < 0.2) {
          const workSayings = {
            farmer: ['Good harvest!', 'Crops growing well'],
            miner: ['Found ore!', 'Deeper we go'],
            builder: ['Building strong!', 'Almost done!'],
            scholar: ['Fascinating!', 'Knowledge grows'],
            warrior: ['Standing guard', 'All clear'],
            merchant: ['Good trade!', 'Profit!'],
            healer: ['All healthy', 'Need more herbs'],
            artist: ['Beautiful!', 'Inspired!'],
            priest: ['Blessings', 'Peace be upon us'],
            explorer: ['New land found!', 'The map grows'],
          };
          const sayings = workSayings[c.profession] || ['Working...'];
          c.bubbleText = sayings[Math.floor(detRand() * sayings.length)];
          c.bubbleTimer = 90;
        }
      }
      // Build nearby incomplete structures
      for (const s of structures) {
        if (!s.complete && Math.hypot(s.x * TILE - c.x, s.y * TILE - c.y) < 30) {
          s.buildProgress += (c.profession === 'builder' ? 3 : 1);
          if (s.buildProgress >= s.buildTime && !s.complete) {
            s.complete = true;
            addEvent(`${STRUCTURE_TYPES[s.type].emoji} ${STRUCTURE_TYPES[s.type].name} completed by ${c.name}!`);
          }
        }
      }
      break;

    case 'socializing':
      if (c.stateTimer <= 0) {
        c.state = 'idle';
        c.stateTimer = 40;
      }
      break;

    case 'fighting': {
      if (!c.target || c.target.hp <= 0) {
        c.state = 'idle';
        c.stateTimer = 30;
        c.target = null;
        break;
      }
      // Move toward threat
      const tdx = c.target.x - c.x, tdy = c.target.y - c.y;
      const tDist = Math.hypot(tdx, tdy);
      if (tDist > 8) {
        c.x += (tdx / tDist) * c.speed * 1.2;
        c.y += (tdy / tDist) * c.speed * 1.2;
      } else {
        // Attack
        if (frame % 20 === 0) {
          const dmg = Math.max(1, c.attack - 2);
          c.target.hp -= dmg;
          if (c.target.hp <= 0) {
            addEvent(`⚔️ ${c.name} (${PROFESSIONS[c.profession].name}) slew a ${c.target.name}!`);
            c.bubbleText = 'Victory!';
            c.bubbleTimer = 60;
            c.state = 'idle';
            c.stateTimer = 30;
          }
        }
      }
      break;
    }

    case 'sleeping':
      if (timeOfDay !== 'night' && c.stateTimer <= 0) {
        c.state = 'idle';
        c.stateTimer = 20;
      }
      break;
  }
}

// ============================================================
// THREAT AI
// ============================================================
function updateThreat(t) {
  t.stateTimer--;
  const detRand = () => { _seed = (_seed * 16807) % 2147483647; return (_seed - 1) / 2147483646; };

  // More active at night
  const speedMul = timeOfDay === 'night' ? 1.5 : 1.0;

  // Remove dead threats
  if (t.hp <= 0) return;

  switch (t.state) {
    case 'patrol': {
      if (t.stateTimer <= 0) {
        // Pick new patrol target (near edges)
        const edge = detRand() > 0.5;
        t.tx = (edge ? (detRand() > 0.5 ? 20 : WORLD_W - 40) : detRand() * WORLD_W);
        t.ty = (edge ? detRand() * (WORLD_H - 60) : (detRand() > 0.5 ? 20 : WORLD_H - 80));
        t.stateTimer = 200 + (detRand() * 300 | 0);
      }
      const dx = t.tx - t.x, dy = t.ty - t.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 3) {
        t.x += (dx / dist) * t.speed * speedMul;
        t.y += (dy / dist) * t.speed * speedMul;
      }
      // Hunt nearby citizens
      let closest = null, closestDist = 80;
      for (const c of citizens) {
        const d = Math.hypot(c.x - t.x, c.y - t.y);
        if (d < closestDist) { closest = c; closestDist = d; }
      }
      if (closest && closestDist < 40) {
        t.state = 'attacking';
        t.target = closest;
        t.stateTimer = 300;
      }
      break;
    }
    case 'attacking': {
      if (!t.target || t.target.hp <= 0) {
        t.state = 'patrol';
        t.stateTimer = 100;
        break;
      }
      const dx = t.target.x - t.x, dy = t.target.y - t.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 6) {
        t.x += (dx / dist) * t.speed * speedMul * 1.3;
        t.y += (dy / dist) * t.speed * speedMul * 1.3;
      } else {
        if (frame % 30 === 0) {
          const dmg = Math.max(1, t.attack - t.target.defense);
          t.target.hp -= dmg;
          if (t.target.hp <= 0) {
            addEvent(`💀 ${t.target.name} was defeated by a ${t.name}!`);
            t.state = 'patrol';
            t.stateTimer = 200;
          }
        }
      }
      // Flee if low HP
      if (t.hp < t.maxHp * 0.2) {
        t.state = 'patrol';
        t.tx = t.x + (detRand() - 0.5) * 200;
        t.ty = t.y + (detRand() - 0.5) * 200;
        t.stateTimer = 300;
      }
      break;
    }
  }
}

// ============================================================
// DANGER ZONES
// ============================================================
function drawDangerZones() {
  for (const t of threats) {
    if (t.hp <= 0) continue;
    const radius = t.type === 'dragon' ? 40 : 25;
    const tileX = Math.floor(t.x / TILE), tileY = Math.floor(t.y / TILE);
    if (tileY >= 0 && tileY < MAP_H && tileX >= 0 && tileX < MAP_W && fogMap[tileY][tileX] < 2) continue;

    ctx.globalAlpha = 0.04 + Math.sin(frame * 0.06 + t.id) * 0.02;
    const gradient = ctx.createRadialGradient(
      (t.x - camX) * SCALE, (t.y - camY) * SCALE, 0,
      (t.x - camX) * SCALE, (t.y - camY) * SCALE, radius * SCALE
    );
    gradient.addColorStop(0, 'rgba(255,0,0,0.3)');
    gradient.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect((t.x - radius - camX) * SCALE, (t.y - radius - camY) * SCALE, radius * 2 * SCALE, radius * 2 * SCALE);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// BATTLE ANIMATIONS
// ============================================================
let battleParticles = [];

function addBattleParticle(x, y) {
  battleParticles.push({
    x, y, vx: (Math.random()-0.5)*1.5, vy: -Math.random()*1 - 0.3,
    life: 20 + Math.random() * 20, maxLife: 40,
    color: Math.random() > 0.5 ? '#ff4040' : '#ffd700',
  });
}

function updateBattleParticles() {
  for (let i = battleParticles.length - 1; i >= 0; i--) {
    const p = battleParticles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.03; p.life--;
    if (p.life <= 0) battleParticles.splice(i, 1);
  }
  // Generate from active fights
  for (const c of citizens) {
    if (c.state === 'fighting' && c.target && frame % 10 === 0) {
      addBattleParticle(c.x + 4, c.y + 4);
    }
  }
  for (const t of threats) {
    if (t.state === 'attacking' && frame % 12 === 0) {
      addBattleParticle(t.x + 3, t.y + 3);
    }
  }
}

function drawBattleParticles() {
  for (const p of battleParticles) {
    ctx.globalAlpha = p.life / p.maxLife;
    px(p.x, p.y, p.color);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DAY/NIGHT CYCLE OVERLAY
// ============================================================
function drawDayNightOverlay() {
  let overlay;
  if (timeOfDay === 'night') overlay = 'rgba(8,8,40,0.45)';
  else if (timeOfDay === 'dusk') overlay = 'rgba(40,15,10,0.2)';
  else if (timeOfDay === 'dawn') overlay = 'rgba(40,25,15,0.15)';
  else overlay = 'rgba(0,0,0,0)';

  if (overlay !== 'rgba(0,0,0,0)') {
    ctx.fillStyle = overlay;
    ctx.fillRect(0, 0, screenW, screenH);
  }
}

// ============================================================
// MINIMAP
// ============================================================
function drawMinimap() {
  const mw = MC.width, mh = MC.height;
  mctx.fillStyle = '#0a1a0a';
  mctx.fillRect(0, 0, mw, mh);

  const sx = mw / WORLD_W, sy = mh / WORLD_H;

  // Biome tiles
  for (let ty = 0; ty < MAP_H; ty++) for (let tx = 0; tx < MAP_W; tx++) {
    if (fogMap[ty][tx] === 0) { mctx.fillStyle = '#080808'; }
    else {
      const biome = biomeMap[ty][tx];
      mctx.fillStyle = BIOME_COLORS[biome].base;
      if (fogMap[ty][tx] === 1) mctx.globalAlpha = 0.5;
    }
    mctx.fillRect(tx * TILE * sx, ty * TILE * sy, TILE * sx + 1, TILE * sy + 1);
    mctx.globalAlpha = 1;
  }

  // Faction territories
  for (const f of FACTIONS) {
    mctx.fillStyle = f.color;
    mctx.globalAlpha = 0.15;
    for (const t of f.territory) {
      mctx.fillRect(t.x * TILE * sx, t.y * TILE * sy, TILE * sx + 1, TILE * sy + 1);
    }
    mctx.globalAlpha = 1;
  }

  // Citizens as dots
  for (const c of citizens) {
    const f = FACTIONS.find(f2 => f2.id === c.faction);
    mctx.fillStyle = f ? f.color : '#888';
    mctx.fillRect(c.x * sx - 1, c.y * sy - 1, 3, 3);
  }

  // Threats as red dots
  for (const t of threats) {
    if (t.hp <= 0) continue;
    mctx.fillStyle = '#ff0000';
    mctx.fillRect(t.x * sx - 1, t.y * sy - 1, 3, 3);
  }

  // Viewport
  const vw = (screenW / SCALE) * sx, vh = (screenH / SCALE) * sy;
  const vpX = camX * sx, vpY = camY * sy;
  mctx.strokeStyle = 'rgba(74,222,128,0.7)';
  mctx.lineWidth = 1.5;
  mctx.strokeRect(vpX, vpY, vw, vh);
}

// CITIZEN POPUP
// ============================================================
let popupCitizen = null;

function showCitizenPopup(c, sx, sy) {
  popupCitizen = c;
  const prof = PROFESSIONS[c.profession];
  const faction = FACTIONS.find(f => f.id === c.faction);

  document.getElementById('cp-emoji').textContent = prof.emoji;

  const hpPct = Math.round(c.hp / c.maxHp * 100);
  document.getElementById('cp-stats').innerHTML =
    `<div class="cp-stat"><span>HP</span><span class="v">${c.hp}/${c.maxHp} (${hpPct}%)</span></div>` +
    `<div class="cp-stat"><span>ATK</span><span class="v">${c.attack}</span></div>` +
    `<div class="cp-stat"><span>DEF</span><span class="v">${c.defense}</span></div>` +
    `<div class="cp-stat"><span>Morale</span><span class="v">${c.morale}%</span></div>` +
    `<div class="cp-stat"><span>Speed</span><span class="v">${c.speed.toFixed(2)}</span></div>` +
    `<div class="cp-stat"><span>Home</span><span class="v">(${c.home.x},${c.home.y})</span></div>`;

  const stateEmoji = { idle: '😴', walking: '🚶', working: '⚒️', fighting: '⚔️', socializing: '💬', sleeping: '😴' };
  document.getElementById('cp-activity').textContent =
    (stateEmoji[c.state] || '') + ' ' + c.state.charAt(0).toUpperCase() + c.state.slice(1);

  // Relationships
  const nearby = citizens.filter(o => o !== c && Math.hypot(o.x - c.x, o.y - c.y) < 80).slice(0, 3);
  document.getElementById('cp-relations').textContent = nearby.length > 0 ?
    'Nearby: ' + nearby.map(n => n.name).join(', ') : 'No one nearby';

  const popup = document.getElementById('citizen-popup');
  let left = sx + 16, top = sy - 60;
  if (left + 320 > screenW) left = sx - 340;
  if (top < 10) top = 10;
  if (top + 280 > screenH) top = screenH - 290;
  popup.style.left = Math.max(10, left) + 'px';
  popup.style.top = Math.max(10, top) + 'px';
  popup.style.display = 'block';
  popup.style.borderColor = faction ? faction.color + '60' : 'rgba(74,222,128,0.3)';
}

function hideCitizenPopup() {
  document.getElementById('citizen-popup').style.display = 'none';
  popupCitizen = null;
}

// INPUT
// ============================================================
let navTargetX = null, navTargetY = null, navAnimating = false;

function smoothNavigateTo(wx, wy) {
  const viewW = screenW / SCALE, viewH = screenH / SCALE;
  navTargetX = Math.max(0, Math.min(wx - viewW / 2, WORLD_W - viewW));
  navTargetY = Math.max(0, Math.min(wy - viewH / 2, WORLD_H - viewH));
  navAnimating = true;
}

C.addEventListener('click', function(e) {
  const gx = e.clientX / SCALE + camX;
  const gy = e.clientY / SCALE + camY;

  hideCitizenPopup();

  // Check citizen click
  for (const c of citizens) {
    if (c.hp <= 0) continue;
    if (Math.abs(c.x + 4 - gx) < 8 && Math.abs(c.y + 5 - gy) < 8) {
      showCitizenPopup(c, e.clientX, e.clientY);
      return;
    }
  }

  // Navigate
  smoothNavigateTo(gx, gy);
});

C.addEventListener('touchstart', function(e) {
  const touch = e.touches[0];
  const gx = touch.clientX / SCALE + camX;
  const gy = touch.clientY / SCALE + camY;
  hideCitizenPopup();

  for (const c of citizens) {
    if (c.hp <= 0) continue;
    if (Math.abs(c.x + 4 - gx) < 10 && Math.abs(c.y + 5 - gy) < 10) {
      showCitizenPopup(c, touch.clientX, touch.clientY);
      return;
    }
  }
  smoothNavigateTo(gx, gy);
}, { passive: true });

// Minimap click
MC.addEventListener('click', function(e) {
  const rect2 = MC.getBoundingClientRect();
  const mx = e.clientX - rect2.left, my = e.clientY - rect2.top;
  const wx = (mx / MC.width) * WORLD_W;
  const wy = (my / MC.height) * WORLD_H;
  smoothNavigateTo(wx, wy);
});

// Arrow keys
let keysDown = {};
document.addEventListener('keydown', function(e) {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault(); keysDown[e.key] = true;
  }
  if (e.key === 'Escape') hideCitizenPopup();
});
document.addEventListener('keyup', function(e) { delete keysDown[e.key]; });

// Zoom
function setZoom(s) {
  const vcx = camX + (screenW / SCALE) / 2;
  const vcy = camY + (screenH / SCALE) / 2;
  SCALE = Math.max(2, Math.min(6, s));
  document.getElementById('zoom-level').textContent = SCALE + 'x';
  camX = vcx - (screenW / SCALE) / 2;
  camY = vcy - (screenH / SCALE) / 2;
}
document.getElementById('zoom-in').addEventListener('click', () => setZoom(SCALE + 1));
document.getElementById('zoom-out').addEventListener('click', () => setZoom(SCALE - 1));

// Speed
document.querySelectorAll('#speed-control button').forEach(btn => {
  btn.addEventListener('click', function() {
    gameSpeed = parseInt(btn.dataset.speed);
    document.querySelectorAll('#speed-control button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ============================================================
// WORLD EVENTS / SPAWNING
// ============================================================
function worldEvents() {
  // Spawn new threats periodically
  if (frame % 1800 === 0 && threats.filter(t => t.hp > 0).length < 8) {
    const type = timeOfDay === 'night' ? pick(['wolf','bandit','spider']) : pick(['wolf','spider']);
    spawnThreat(type);
    addEvent(`⚠️ A ${THREAT_TYPES[type].name} appeared at the border!`);
  }

  // Dragon at night (rare)
  if (frame % 6000 === 0 && timeOfDay === 'night' && threats.filter(t => t.type === 'dragon').length === 0) {
    spawnThreat('dragon');
    addEvent('🐉 A Shadow Drake has emerged from the darkness!');
  }

  // New buildings over time
  if (frame % 3000 === 0) {
    const f = pick(FACTIONS);
    const types = ['house','shop','tavern','library'];
    const type = pick(types);
    const bx = f.homeX + randInt(-6, 6);
    const by = f.homeY + randInt(-6, 6);
    if (bx > 0 && bx < MAP_W - 3 && by > 0 && by < MAP_H - 4 &&
        biomeMap[by] && biomeMap[by][bx] !== BIOME.WATER && biomeMap[by][bx] !== BIOME.MOUNTAIN) {
      createStructure(type, bx, by, f);
      addEvent(`🏗️ ${f.icon} ${f.name} began building a ${STRUCTURE_TYPES[type].name}`);
    }
  }

  // New citizens born
  if (frame % 2400 === 0 && citizens.filter(c => c.hp > 0).length < 60) {
    const f = pick(FACTIONS);
    const cx2 = f.homeX + randInt(-3, 3);
    const cy2 = f.homeY + randInt(-3, 3);
    if (biomeMap[cy2] && biomeMap[cy2][cx2] !== BIOME.WATER) {
      const c = createCitizen(f, cx2, cy2);
      addEvent(`🎉 ${c.name} (${PROFESSIONS[c.profession].emoji} ${PROFESSIONS[c.profession].name}) joined ${f.name}!`);
    }
  }

  // Resource consumption
  if (frame % 600 === 0) {
    const pop = citizens.filter(c => c.hp > 0).length;
    resources.food = Math.max(0, resources.food - Math.floor(pop * 0.3));
    if (resources.food === 0) {
      addEvent('⚠️ Food supplies are running low!');
      // Morale drops
      for (const c of citizens) c.morale = Math.max(10, c.morale - 5);
    }
  }

  // Clean up dead threats
  threats = threats.filter(t => t.hp > 0);

  // Clean up dead citizens (mark as dead, remove from render after a while)
  citizens = citizens.filter(c => c.hp > 0);
  for (const f of FACTIONS) {
    f.citizens = f.citizens.filter(c => c.hp > 0);
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function update() {
  updateTime();
  for (const c of citizens) updateCitizen(c);
  for (const t of threats) updateThreat(t);
  updateBattleParticles();
  worldEvents();

  // Keyboard scroll
  const speed = 2;
  const viewW = screenW / SCALE, viewH = screenH / SCALE;
  if (keysDown['ArrowUp']) camY = Math.max(0, camY - speed);
  if (keysDown['ArrowDown']) camY = Math.min(WORLD_H - viewH, camY + speed);
  if (keysDown['ArrowLeft']) camX = Math.max(0, camX - speed);
  if (keysDown['ArrowRight']) camX = Math.min(WORLD_W - viewW, camX + speed);

  // Smooth nav
  if (navAnimating && navTargetX !== null) {
    const dx = navTargetX - camX, dy = navTargetY - camY;
    if (Math.hypot(dx, dy) < 0.5) { camX = navTargetX; camY = navTargetY; navAnimating = false; }
    else { camX += dx * 0.08; camY += dy * 0.08; }
  }

  // Clamp camera
  camX = Math.max(0, Math.min(camX, WORLD_W - viewW));
  camY = Math.max(0, Math.min(camY, WORLD_H - viewH));

  if (frame % 60 === 0) updateUI();
}

function draw() {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, screenW, screenH);

  // Draw visible tiles
  const startTX = Math.max(0, Math.floor(camX / TILE) - 1);
  const startTY = Math.max(0, Math.floor(camY / TILE) - 1);
  const endTX = Math.min(MAP_W, Math.ceil((camX + screenW / SCALE) / TILE) + 1);
  const endTY = Math.min(MAP_H, Math.ceil((camY + screenH / SCALE) / TILE) + 1);

  for (let ty = startTY; ty < endTY; ty++) {
    for (let tx = startTX; tx < endTX; tx++) {
      drawTile(tx, ty);
    }
  }

  drawTerritories();
  drawStructures();
  drawDangerZones();

  // Draw citizens sorted by Y
  const sortedCitizens = citizens.filter(c => c.hp > 0).sort((a, b) => a.y - b.y);
  for (const c of sortedCitizens) drawCitizen(c);

  // Draw threats
  for (const t of threats) if (t.hp > 0) drawThreat(t);

  drawBattleParticles();
  drawDayNightOverlay();

  if (frame % 10 === 0) drawMinimap();
}

function loop() {
  frame++;
  if (worldReady) {
    for (let s = 0; s < gameSpeed; s++) update();
    draw();
  }
  requestAnimationFrame(loop);
}

// ============================================================
// INITIALIZATION
// ============================================================
function init() {
  generateBiomeMap();
  initFactionTerritories();
  spawnInitialStructures();
  spawnInitialCitizens();
  spawnInitialThreats();

  // Center camera on map center
  camX = WORLD_W * 0.3 - screenW / SCALE / 2;
  camY = WORLD_H * 0.3 - screenH / SCALE / 2;

  // Initial events
  addEvent('🏛️ The AI Civilization awakens...');
  addEvent('🌿 Verdant Collective established their settlement');
  addEvent('💎 Azure Order has arrived from the east');
  addEvent('🔥 Crimson Pact claims the southern lands');
  addEvent('👑 Golden Accord settles near the coast');

  worldReady = true;
  const ls = document.getElementById('loading-screen');
  ls.classList.add('fade-out');
  setTimeout(() => ls.style.display = 'none', 700);

  updateUI();
}

init();
loop();
